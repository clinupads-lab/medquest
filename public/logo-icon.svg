<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040B1A"/>
      <stop offset="100%" stop-color="#0E1D4A"/>
    </linearGradient>
    <radialGradient id="ambient" cx="50%" cy="42%" r="56%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="qmark" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <radialGradient id="dot-fill" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </radialGradient>
    <filter id="q-glow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-glow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22" fill="url(#ambient)"/>
  <rect x="1" y="1" width="98" height="98" rx="21.5"
        fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>

  <!-- ECG line — subtle medical accent -->
  <path d="M 6,76 L 18,76 L 21,66 L 24,86 L 27,58 L 30,93 L 34,76 L 66,76 L 69,66 L 72,86 L 75,58 L 78,93 L 82,76 L 94,76"
        fill="none" stroke="#3B82F6" stroke-width="1.3"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.13"/>

  <!-- ? soft glow shadow -->
  <path d="M 36,52 C 36,22 64,22 64,43 C 64,59 51,65 50,70"
        fill="none" stroke="#3B82F6" stroke-width="15"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.28"/>

  <!-- ? main stroke -->
  <path d="M 36,52 C 36,22 64,22 64,43 C 64,59 51,65 50,70"
        fill="none" stroke="url(#qmark)" stroke-width="7.5"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#q-glow)"/>

  <!-- Dot outer glow -->
  <circle cx="50" cy="84" r="12" fill="#2563EB" opacity="0.22" filter="url(#dot-glow)"/>
  <!-- Dot body -->
  <circle cx="50" cy="84" r="7" fill="url(#dot-fill)" filter="url(#q-glow)"/>
  <!-- Dot rim -->
  <circle cx="50" cy="84" r="7" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <!-- Medical cross -->
  <line x1="50" y1="79.8" x2="50" y2="88.2" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="45.8" y1="84" x2="54.2" y2="84" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Shine -->
  <circle cx="47.5" cy="81.5" r="1.4" fill="white" opacity="0.5"/>
</svg>
